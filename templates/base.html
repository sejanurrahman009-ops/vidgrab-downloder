<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Optimized SEO -->
    <title>{% block title %}VidGrab — Fast Free Video Downloader{% endblock %}</title>
    <meta name="description" content="{% block description %}Download high-quality videos from social platforms free and fast with VidGrab.{% endblock %}">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph -->
    <meta property="og:title" content="VidGrab Online Video Downloader">
    <meta property="og:type" content="website">
    
    <!-- Fonts & Styles -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head_extra %}{% endblock %}
</head>
<body class="flex flex-col min-h-screen selection:bg-purple-500/30 selection:text-white">

    <!-- Navbar -->
    <header class="sticky top-0 z-50 border-b border-[#1e2d4a]/60 backdrop-blur-md bg-[#050a14]/80">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg glow-btn flex items-center justify-center text-white font-bold text-sm">V</div>
                <span class="font-bold text-lg tracking-tight gradient-text">VidGrab</span>
            </a>
            <nav class="hidden md:flex gap-6 text-sm text-slate-400">
                <a href="/#features" class="hover:text-white transition-colors">Features</a>
                <a href="/#how" class="hover:text-white transition-colors">How it Works</a>
                <a href="/#faq" class="hover:text-white transition-colors">FAQ</a>
            </nav>
            <a href="/#downloader" class="text-sm px-4 py-2 rounded-lg border border-purple-500/40 text-purple-400 hover:bg-purple-500/10 transition-all">Try Free &rarr;</a>
        </div>
    </header>

    <main class="flex-grow flex flex-col">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-[#1e2d4a]/40 py-8 px-4 text-center text-slate-500 text-xs bg-[#050a14]">
        <div class="max-w-4xl mx-auto flex flex-col gap-4">
            <p>&copy; 2026 VidGrab. Personal use only.</p>
            <div class="flex justify-center gap-4">
                <a href="/privacy-policy" class="hover:text-white">Privacy</a>
                <a href="/terms-of-conditions" class="hover:text-white">Terms</a>
            </div>
        </div>
    </footer>

    <!-- Ad Banner -->
    <div id="sticky-ad-container" class="fixed bottom-0 left-0 w-full bg-[#050a14]/90 backdrop-blur-md border-t border-[#1e2d4a] z-50 p-2 flex justify-center">
        <div class="relative">
            <button onclick="document.getElementById('sticky-ad-container').style.display='none'" class="absolute -top-3 -right-3 w-6 h-6 bg-slate-800 rounded-full text-xs hover:bg-slate-700">&times;</button>
            <div class="w-[320px] h-[50px] md:w-[728px] md:h-[90px] bg-black/40 border border-slate-800 rounded flex items-center justify-center overflow-hidden">
                <span class="text-slate-500 text-xs">Advertisement</span>
            </div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
